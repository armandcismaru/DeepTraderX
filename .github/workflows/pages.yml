name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  # Build (but do not deploy) on PRs so docs changes are validated before merge.
  pull_request:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize runs per ref; never cancel an in-progress deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the Markdown in docs/ into a static HTML site with Jekyll.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        # Defaults to uploading ./_site produced by the Jekyll build above.

  # Deploy the built site to GitHub Pages — only from main (never on PRs).
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
